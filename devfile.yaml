schemaVersion: 2.3.0
metadata:
  name: meshbot
  version: 0.1.0
  description: MeshCore mesh network chatbot with AI agent support
  language: Python

components:
  - name: dev
    container:
      image: registry.access.redhat.com/ubi9/python-312:latest
      memoryLimit: 2Gi
      cpuLimit: "2"
      mountSources: true
      env:
        - name: SERIAL_PORT
          value: /dev/ttyACM0
        # Configure via DevSpaces secrets:
        # OLLAMA_BASE_URL, ANTHROPIC_API_KEY, DEEPSEEK_API_KEY, etc.

commands:
  - id: install
    exec:
      label: "Install dependencies"
      component: dev
      commandLine: pip install uv && uv sync
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true

  - id: run
    exec:
      label: "Run meshbot"
      component: dev
      commandLine: uv run meshbot -p $SERIAL_PORT -c config.yaml run
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true

  - id: mcp-server
    exec:
      label: "Run MCP server standalone"
      component: dev
      commandLine: uv run meshbot -p $SERIAL_PORT mcp-server
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run

  - id: test
    exec:
      label: "Run tests"
      component: dev
      commandLine: uv run pytest -v
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: test
        isDefault: true

  - id: lint
    exec:
      label: "Run linting"
      component: dev
      commandLine: uv run ruff check && uv run mypy meshbot
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: test
